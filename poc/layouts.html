<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Patram — layout explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Mukta:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#e9d3a3;--folio:#f4e7c6;--surface:#fbf3dc;--surface-2:#f3e6c3;--inset:#efdfb8;
  --ink:#2c1e12;--ink-2:#6f5636;--ink-3:#a08961;--line:#ddc794;--line-2:#cbae72;
  --gold:#b6862c;--gold-2:#8f6717;--sindoor:#c0261d;--sindoor-press:#98170f;--sindoor-wash:#f7ddce;
  --haldi:#e79310;--haldi-wash:#fbe7bc;--neel:#1d3a63;--neel-ink:#122240;
  --mehendi:#4c7a2f;--mehendi-wash:#e6efc9;--maroon:#7c1512;--maroon-wash:#f4dbd2;
  --r-card:12px;--r-ctrl:9px;
  --shadow:0 1px 2px rgba(70,44,10,.07),0 8px 22px rgba(90,60,18,.10);
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  --sans:"Mukta",ui-sans-serif,system-ui,sans-serif;
  --display:"Rozha One",Georgia,serif;
}
*{box-sizing:border-box;}
body{
  margin:0;font-family:var(--sans);font-size:15px;line-height:1.55;color:var(--ink);
  background-color:var(--paper);
  background-image:
    repeating-linear-gradient(45deg,rgba(143,103,23,.06) 0 1px,transparent 1px 24px),
    repeating-linear-gradient(-45deg,rgba(143,103,23,.06) 0 1px,transparent 1px 24px);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{margin:0;font-family:var(--display);font-weight:400;}
button{font-family:inherit;cursor:pointer;}
.mono{font-family:var(--mono);}

/* ---- POC switcher (not part of the product) ---------------------------- */
.poc{position:sticky;top:0;z-index:50;background:rgba(44,30,18,.96);color:#f2e7c8;
  padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.poc b{font-family:var(--display);font-weight:400;font-size:19px;color:#fbf3dc;}
.poc .tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--haldi);}
.seg{display:flex;gap:4px;background:rgba(255,255,255,.08);border-radius:999px;padding:4px;margin-left:auto;flex-wrap:wrap;}
.seg button{border:0;background:transparent;color:#e9dab6;font-size:13px;font-weight:600;padding:7px 14px;border-radius:999px;transition:background .12s,color .12s;}
.seg button[aria-current="true"]{background:linear-gradient(135deg,var(--haldi),var(--sindoor));color:#fff;}
.poc-note{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--line-2);font-size:13.5px;color:var(--ink-2);}
.poc-note b{font-family:var(--sans);font-weight:700;color:var(--ink);}

.screen{display:none;max-width:1240px;margin:0 auto;padding:0 20px 60px;}
.screen.on{display:block;}

/* ---- shared chrome ------------------------------------------------------ */
.topbar{position:relative;display:flex;align-items:center;gap:20px;padding:22px 4px 20px;margin-bottom:22px;flex-wrap:wrap;}
.topbar::after{content:"";position:absolute;left:0;right:0;bottom:0;height:11px;
  background:linear-gradient(135deg,var(--sindoor) 25%,transparent 25%) -9px 0,
             linear-gradient(225deg,var(--sindoor) 25%,transparent 25%) -9px 0;
  background-size:18px 11px;background-repeat:repeat-x;border-top:2px solid var(--gold);
  filter:drop-shadow(0 2px 1px rgba(90,60,18,.18));}
.wordmark{display:flex;align-items:center;gap:12px;}
.glyph{width:40px;height:40px;border-radius:11px;background:linear-gradient(150deg,var(--haldi),var(--sindoor));
  color:#fdf3d8;display:grid;place-items:center;font-weight:700;font-size:22px;
  box-shadow:0 0 0 1px var(--gold),inset 0 0 0 1px rgba(255,255,255,.28),0 4px 12px rgba(192,38,29,.28);}
.wordmark b{font-family:var(--display);font-size:25px;letter-spacing:.01em;}
.wordmark .tld{color:var(--gold-2);font-size:18px;}
.wordmark small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--ink-3);text-transform:uppercase;margin-top:1px;}
.runtime{margin-left:auto;display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-2);
  border-radius:999px;padding:8px 16px 8px 13px;box-shadow:var(--shadow),inset 0 0 0 3px var(--surface),inset 0 0 0 4px rgba(182,134,44,.28);}
.led{width:9px;height:9px;border-radius:50%;background:var(--mehendi);}
.runtime .rt-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);}
.runtime .rt-msg{font-family:var(--mono);font-size:12px;color:var(--ink);}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);}

/* section label (diamond + rule) */
.grouplabel{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);margin:18px 0 12px;}
.grouplabel::before{content:"◆";color:var(--sindoor);font-size:8px;}
.grouplabel::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line-2),transparent);}

/* shared components */
.drop{border:1.5px dashed var(--line-2);border-radius:var(--r-ctrl);background:var(--surface-2);padding:30px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.drop .di{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--sindoor);box-shadow:0 0 0 1px rgba(182,134,44,.22);}
.drop .di svg{width:20px;height:20px;}
.drop strong{font-size:14.5px;font-weight:600;}
.drop .hint{font-size:12px;color:var(--ink-3);font-family:var(--mono);}
.files{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.file{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-ctrl);padding:10px 12px;}
.file .fi{width:30px;height:30px;border-radius:8px;background:var(--haldi-wash);color:var(--sindoor);display:grid;place-items:center;flex:none;}
.file .fi svg{width:15px;height:15px;}
.file .name{font-size:13.5px;font-weight:500;}
.file .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);}
.run{margin-top:18px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;
  background:linear-gradient(135deg,var(--haldi),var(--sindoor));color:#fdf3d8;border:0;border-radius:var(--r-ctrl);
  padding:13px 18px;font-size:14.5px;font-weight:700;letter-spacing:.02em;
  box-shadow:0 0 0 1px var(--gold),0 1px 2px rgba(152,23,15,.35),0 8px 20px rgba(192,38,29,.24);}
.run svg{width:16px;height:16px;}
.field{margin-top:18px;}
.field>label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);margin-bottom:8px;}
.panel-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:14px;}
.result{border:1px solid #bcd190;background:linear-gradient(180deg,var(--mehendi-wash),var(--surface));border-radius:var(--r-card);
  padding:24px;text-align:center;box-shadow:inset 0 0 0 4px var(--surface),inset 0 0 0 5px rgba(76,122,47,.3);
  display:flex;flex-direction:column;align-items:center;gap:14px;}
.result .ok-ring{width:48px;height:48px;border-radius:50%;background:var(--surface);border:1px solid #bcd190;color:var(--mehendi);display:grid;place-items:center;box-shadow:0 0 0 4px var(--mehendi-wash);}
.result .ok-ring svg{width:22px;height:22px;}
.result h4{font-size:20px;}
.stat-row{display:flex;gap:8px;width:100%;max-width:340px;}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px;}
.stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
.stat .v{font-family:var(--mono);font-weight:700;font-size:13px;margin-top:3px;}
.stat.hi .v{color:var(--mehendi);}
.btn-dl{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--neel);color:#f2e7c8;border:0;border-radius:var(--r-ctrl);padding:12px;font-weight:700;font-size:13.5px;box-shadow:0 0 0 1px var(--neel-ink),0 6px 16px rgba(18,34,64,.22);}
.btn-dl svg{width:15px;height:15px;}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mehendi);background:var(--mehendi-wash);border:1px solid #bcd190;border-radius:999px;padding:5px 11px;}
.tool-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:2px solid var(--line);padding-bottom:18px;margin-bottom:24px;}
.tool-head h2{font-size:27px;}
.tool-head p{margin:6px 0 0;color:var(--ink-2);font-size:14.5px;font-family:var(--sans);}

/* seal */
.seal{width:100%;max-width:210px;}
.seal svg{width:100%;height:auto;display:block;}
.seal .rot{transform-box:fill-box;transform-origin:center;animation:mandala 90s linear infinite;}
@keyframes mandala{to{transform:rotate(360deg);}}

/* ============================ LAYOUT 1 · INDEX =========================== */
.l1-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.l1-card{position:relative;text-align:left;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);
  padding:16px;box-shadow:inset 0 0 0 4px var(--surface),inset 0 0 0 5px rgba(182,134,44,.24);
  transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;gap:10px;}
.l1-card:hover{transform:translateY(-3px);box-shadow:var(--shadow),inset 0 0 0 4px var(--surface),inset 0 0 0 5px var(--sindoor);}
.l1-card .ico{width:38px;height:38px;border-radius:10px;background:var(--haldi-wash);color:var(--sindoor);display:grid;place-items:center;}
.l1-card .ico svg{width:19px;height:19px;}
.l1-card .nm{font-weight:700;font-size:15px;}
.l1-card .ds{font-size:12.5px;color:var(--ink-2);line-height:1.4;}
.l1-card .fol{position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:10px;color:var(--ink-3);}
.l1-back{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:18px;}
.l1-work{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);padding:30px 34px;
  box-shadow:var(--shadow),inset 0 0 0 5px var(--surface),inset 0 0 0 6px rgba(182,134,44,.30);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start;}
@media(max-width:820px){.grid2{grid-template-columns:1fr;}}

/* ============================ LAYOUT 2 · FOLIO ========================== */
.l2-wrap{display:grid;grid-template-columns:64px 1fr;gap:0;background:var(--surface);border:1px solid var(--line-2);
  border-radius:var(--r-card);box-shadow:var(--shadow);overflow:hidden;}
.l2-spine{background:linear-gradient(180deg,var(--neel),var(--neel-ink));padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:4px;border-right:2px solid var(--gold);}
.l2-spine .sp{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;color:#e9dab6;font-family:var(--mono);font-size:11px;transition:background .12s;}
.l2-spine .sp[aria-current="true"]{background:linear-gradient(135deg,var(--haldi),var(--sindoor));color:#fff;box-shadow:0 0 0 1px var(--gold);}
.l2-spine .sp:hover{background:rgba(255,255,255,.12);}
.l2-spread{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:0;}
.l2-leaf{padding:30px 34px;}
.l2-leaf.in{background:linear-gradient(90deg,var(--surface),var(--folio));border-right:0;}
.l2-leaf.out{background:linear-gradient(270deg,var(--surface),var(--folio));}
.l2-gutter{position:absolute;top:0;bottom:0;left:50%;width:34px;transform:translateX(-50%);
  background:linear-gradient(90deg,rgba(143,103,23,.10),rgba(143,103,23,.22),rgba(143,103,23,.10));
  border-left:1px solid var(--line-2);border-right:1px solid var(--line-2);
  display:flex;flex-direction:column;align-items:center;justify-content:space-around;pointer-events:none;}
.l2-gutter i{width:11px;height:11px;border-radius:50%;background:var(--paper);box-shadow:inset 0 1px 3px rgba(0,0,0,.35),0 0 0 1px var(--line-2);}
.l2-leaf h3{font-size:15px;font-family:var(--mono);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);margin-bottom:16px;}
@media(max-width:820px){.l2-spread{grid-template-columns:1fr;}.l2-gutter{display:none;}.l2-leaf.in{border-bottom:1px solid var(--line-2);}}

/* ============================ LAYOUT 3 · TABS =========================== */
.l3-tabs{display:flex;gap:6px;border-bottom:2px solid var(--line);margin-bottom:2px;flex-wrap:wrap;}
.l3-tabs button{border:0;background:transparent;font-size:14.5px;font-weight:700;color:var(--ink-3);padding:11px 16px;border-radius:9px 9px 0 0;position:relative;}
.l3-tabs button[aria-current="true"]{color:var(--sindoor-press);background:var(--haldi-wash);}
.l3-tabs button[aria-current="true"]::after{content:"";position:absolute;left:12px;right:12px;bottom:-2px;height:3px;background:linear-gradient(90deg,var(--haldi),var(--sindoor));border-radius:3px;}
.l3-sub{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0 22px;}
.l3-chip{font-size:13px;font-weight:600;color:var(--ink-2);background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:8px 14px;}
.l3-chip[aria-current="true"]{color:#fff;background:linear-gradient(135deg,var(--haldi),var(--sindoor));border-color:var(--gold);}
.l3-stage{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);padding:30px 34px;box-shadow:var(--shadow),inset 0 0 0 5px var(--surface),inset 0 0 0 6px rgba(182,134,44,.30);}

/* ============================ LAYOUT 4 · PALETTE ======================= */
.l4-hero{min-height:56vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:40px 0;}
.l4-hero h1{font-size:clamp(30px,5vw,52px);line-height:1.05;}
.l4-hero h1 .u{color:var(--sindoor);}
.l4-hero p{color:var(--ink-2);font-size:16px;max-width:46ch;margin:0;}
.l4-search{display:flex;align-items:center;gap:12px;width:min(520px,90%);background:var(--surface);border:1px solid var(--line-2);
  border-radius:999px;padding:14px 20px;box-shadow:var(--shadow),inset 0 0 0 3px var(--surface),inset 0 0 0 4px rgba(182,134,44,.28);}
.l4-search .kbd{font-family:var(--mono);font-size:11px;color:var(--ink-2);background:var(--inset);border:1px solid var(--line-2);border-radius:6px;padding:3px 7px;}
.l4-search .ph{color:var(--ink-3);font-size:15px;}
.l4-recent{font-family:var(--mono);font-size:12px;color:var(--ink-3);}
.l4-recent b{color:var(--sindoor-press);font-family:var(--sans);}
/* palette overlay */
.l4-overlay{margin:26px auto 0;width:min(560px,94%);background:var(--surface);border:1px solid var(--line-2);border-radius:14px;
  box-shadow:0 24px 60px rgba(44,30,18,.35),inset 0 0 0 4px var(--surface),inset 0 0 0 5px rgba(182,134,44,.3);overflow:hidden;}
.l4-overlay .bar{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line);}
.l4-overlay .bar input{flex:1;border:0;background:transparent;font-family:var(--sans);font-size:16px;color:var(--ink);outline:none;}
.l4-overlay .list{max-height:260px;overflow:auto;padding:8px;}
.l4-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;}
.l4-row:first-child,.l4-row.sel{background:var(--haldi-wash);}
.l4-row .ico{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--line-2);color:var(--sindoor);display:grid;place-items:center;}
.l4-row .ico svg{width:16px;height:16px;}
.l4-row .nm{font-weight:600;font-size:14px;}
.l4-row .ct{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}

/* ==================== LAYOUT 5 · HERO + INDEX (featured) ================= */
.l5-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:20px 0 34px;}
.l5-hero .seal{max-width:186px;}
.l5-hero h1{font-size:clamp(30px,5vw,52px);line-height:1.06;}
.l5-hero h1 .u{color:var(--sindoor);position:relative;white-space:nowrap;}
.l5-hero h1 .u::after{content:"";position:absolute;left:0;right:0;bottom:-.04em;height:3px;background:linear-gradient(90deg,var(--haldi),var(--sindoor));border-radius:3px;}
.l5-hero p{color:var(--ink-2);font-size:16px;max-width:46ch;margin:0;}
.l5-search{display:flex;align-items:center;gap:12px;width:min(560px,92%);background:var(--surface);border:1px solid var(--line-2);
  border-radius:999px;padding:6px 18px;box-shadow:var(--shadow),inset 0 0 0 3px var(--surface),inset 0 0 0 4px rgba(182,134,44,.28);}
.l5-search input{flex:1;border:0;background:transparent;font-family:var(--sans);font-size:16px;color:var(--ink);outline:none;padding:11px 0;}
.l5-search .kbd{font-family:var(--mono);font-size:11px;color:var(--ink-2);background:var(--inset);border:1px solid var(--line-2);border-radius:6px;padding:3px 7px;}
.l5-divider{display:flex;align-items:center;gap:10px;margin:6px 0 4px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);}
.l5-divider::before,.l5-divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent);}
.l5-empty{text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:13px;padding:44px 0;}
.l5-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0 22px;}
.l5-pill{font-size:13.5px;font-weight:700;color:var(--ink-2);background:var(--surface);border:1px solid var(--line-2);border-radius:999px;padding:9px 18px;white-space:nowrap;transition:color .12s,background .12s,border-color .12s,box-shadow .12s;}
.l5-pill:hover{border-color:var(--gold);}
.l5-pill[aria-current="true"]{color:#fff;background:linear-gradient(135deg,var(--haldi),var(--sindoor));border-color:var(--gold);box-shadow:0 4px 12px rgba(192,38,29,.22);}
.l5-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}

/* ============= LAYOUT 6 · STUDIO RAIL (sidebar nav + runtime hero) ======= */
.l6-wrap{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;}
.l6-rail{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);
  padding:16px 14px;max-height:calc(100vh - 180px);overflow-y:auto;
  box-shadow:var(--shadow),inset 0 0 0 4px var(--surface),inset 0 0 0 5px rgba(182,134,44,.24);}
.l6-rail .grouplabel{margin:16px 6px 8px;}
.l6-rail .grouplabel:first-child{margin-top:4px;}
.l6-nav{display:flex;flex-direction:column;gap:2px;}
.l6-item{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:transparent;border:0;border-radius:var(--r-ctrl);padding:9px 12px;
  font-family:inherit;color:var(--ink);transition:background .12s,color .12s;}
.l6-item:hover{background:var(--haldi-wash);}
.l6-item[aria-current="true"]{background:linear-gradient(135deg,var(--haldi),var(--sindoor));color:#fff;box-shadow:0 4px 12px rgba(192,38,29,.22);}
.l6-item .no{font-family:var(--mono);font-size:11px;color:var(--ink-3);flex:none;}
.l6-item:hover .no{color:var(--sindoor);}
.l6-item[aria-current="true"] .no{color:rgba(255,255,255,.82);}
.l6-item .nm{font-size:14px;font-weight:600;}

.l6-main{position:relative;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);
  padding:34px 38px;box-shadow:var(--shadow),inset 0 0 0 5px var(--surface),inset 0 0 0 6px rgba(182,134,44,.30);}
.l6-seal{position:absolute;top:30px;right:34px;width:150px;max-width:32%;}
.l6-main h1{font-size:clamp(28px,3.4vw,46px);line-height:1.07;max-width:15ch;margin:14px 0 0;}
.l6-main h1 .u{color:var(--sindoor);position:relative;white-space:nowrap;}
.l6-main h1 .u::after{content:"";position:absolute;left:0;right:0;bottom:-.06em;height:3px;background:linear-gradient(90deg,var(--haldi),var(--sindoor));border-radius:3px;}
.l6-lede{color:var(--ink-2);font-size:16px;max-width:52ch;margin:20px 0 0;}
.l6-quote{margin:22px 0 0;padding:10px 0 10px 18px;border-left:3px solid var(--sindoor);
  font-size:14.5px;line-height:1.55;color:var(--ink-2);font-style:italic;max-width:62ch;}
.l6-quote b{color:var(--sindoor);font-family:var(--display);font-style:normal;font-weight:400;}
.l6-console{margin:24px 0 0;background:linear-gradient(180deg,var(--neel),var(--neel-ink));border:1px solid var(--neel-ink);
  border-radius:var(--r-card);padding:18px 22px;font-family:var(--mono);font-size:12.5px;line-height:1.9;color:#c4d1e6;
  box-shadow:0 8px 22px rgba(18,34,64,.28),inset 0 1px 0 rgba(255,255,255,.06);}
.l6-console .ln{display:flex;gap:10px;}
.l6-console .ln::before{content:"›";color:var(--haldi);flex:none;}
.l6-console .ln.ok{color:#dfeccf;}
.l6-console .ln.ok::before{content:"✓";color:#7fc46b;}
.l6-pills{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 0;}
.l6-trust{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;
  color:var(--mehendi);background:var(--mehendi-wash);border:1px solid #bcd190;border-radius:999px;padding:8px 14px;}
.l6-trust svg{width:15px;height:15px;flex:none;}
.l6-cta{margin:22px 0 0;color:var(--ink-3);font-size:14.5px;}
@media(max-width:900px){.l6-wrap{grid-template-columns:1fr;}.l6-rail{max-height:none;}.l6-seal{width:110px;top:24px;right:24px;}.l6-main{padding:26px 22px;}}

/* ====== LAYOUT 7 · STUDIO INDEX (hero sidebar + illuminated index) ====== */
.l7-wrap{display:grid;grid-template-columns:308px 1fr;gap:24px;align-items:start;}
.l7-hero{position:sticky;top:14px;background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-card);
  padding:26px 24px;box-shadow:var(--shadow),inset 0 0 0 4px var(--surface),inset 0 0 0 5px rgba(182,134,44,.24);}
.l7-hero .seal{width:112px;margin-bottom:16px;}
.l7-hero h1{font-size:clamp(26px,2.4vw,34px);line-height:1.1;margin:10px 0 0;}
.l7-hero h1 .u{color:var(--sindoor);position:relative;white-space:nowrap;}
.l7-hero h1 .u::after{content:"";position:absolute;left:0;right:0;bottom:-.06em;height:3px;background:linear-gradient(90deg,var(--haldi),var(--sindoor));border-radius:3px;}
.l7-lede{color:var(--ink-2);font-size:14.5px;line-height:1.5;margin:14px 0 0;}
.l7-trust{display:flex;flex-direction:column;align-items:flex-start;gap:8px;margin:20px 0 0;padding-top:18px;border-top:1px solid var(--line);}
.l7-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:0 0 16px;}
.l7-bar .l5-pills{margin:0;justify-content:flex-start;}
.l7-bar .l5-search{width:min(300px,100%);flex:none;}
@media(max-width:900px){.l7-wrap{grid-template-columns:1fr;}.l7-hero{position:static;display:grid;grid-template-columns:auto 1fr;column-gap:20px;align-items:center;}
  .l7-hero .seal{grid-row:1/3;width:96px;margin:0;}.l7-hero .eyebrow,.l7-hero h1,.l7-hero .l7-lede{grid-column:2;}
  .l7-hero .l7-trust{grid-column:1/3;flex-direction:row;flex-wrap:wrap;}}
@media(max-width:560px){.l7-hero{display:block;}.l7-hero .seal{width:84px;}.l7-bar{flex-direction:column;align-items:stretch;}.l7-bar .l5-search{width:100%;}}

.foot{margin-top:28px;padding:18px 4px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-3);border-top:1px solid var(--line);}

/* ---- mobile ------------------------------------------------------------- */
@media(max-width:640px){
  .screen{padding:0 16px 48px;}
  .topbar{gap:12px;padding:16px 2px;margin-bottom:20px;}
  .wordmark{gap:10px;}
  .glyph{width:36px;height:36px;font-size:20px;}
  .wordmark b{font-size:21px;}.wordmark .tld{font-size:15px;}
  .runtime{padding:6px 12px 6px 11px;gap:8px;}
  .runtime .rt-label{display:none;}
  .l5-hero{padding:8px 0 22px;gap:12px;}
  .l5-hero .seal{max-width:128px;}
  .l5-hero p{font-size:14.5px;}
  .l5-search{padding:4px 14px;}
  .l5-search input{font-size:15px;}
  .l5-pills{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;gap:7px;margin:2px -16px 18px;padding:0 16px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .l5-pills::-webkit-scrollbar{display:none;}
  .l5-pill{padding:8px 15px;font-size:13px;}
  .l5-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .l1-card{padding:13px;box-shadow:inset 0 0 0 3px var(--surface),inset 0 0 0 4px rgba(182,134,44,.24);}
  .l1-card .ico{width:34px;height:34px;}
  .l1-card .nm{font-size:14px;}
  .l1-card .ds{font-size:11.5px;}
  .l1-work{padding:22px 18px;}
  .grid2{gap:18px;}
  .tool-head h2{font-size:23px;}
}
@media(max-width:380px){.l5-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="poc">
  <b>Patram</b><span class="tag">layout POC</span>
  <div class="seg" id="seg">
    <button data-l="7" aria-current="true">★ Studio index</button>
    <button data-l="5">5 · Hero + index</button>
    <button data-l="1">1 · Illuminated index</button>
    <button data-l="2">2 · Folio spread</button>
    <button data-l="3">3 · Top tabs</button>
    <button data-l="4">4 · ⌘K palette</button>
    <button data-l="6">6 · Sidebar studio</button>
  </div>
</div>
<div class="poc-note" id="note"></div>

<!-- shared header markup is injected per screen by JS -->
<section class="screen on" id="s1"></section>
<section class="screen" id="s2"></section>
<section class="screen" id="s3"></section>
<section class="screen" id="s4"></section>
<section class="screen" id="s5"></section>
<section class="screen" id="s6"></section>
<section class="screen" id="s7"></section>

<script>
const I = {
  up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M6 10l6-6 6 6"/><path d="M4 20h16"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v5h5"/><path d="M6 2h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/></svg>',
  run:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z"/></svg>',
  dl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11M7 11l5 5 5-5"/><path d="M5 20h14"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
  layers:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>',
  min:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 9L4 4M9 9V5M9 9H5M15 15l5 5M15 15v4M15 15h4"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v5h5"/><path d="M6 2h9l5 5v13H6z"/><path d="M9 13h6M9 17h4"/></svg>',
  swap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13l-3-3M20 16H7l3 3"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>',
};
const CATICON = {"Assemble":I.layers,"Optimize":I.min,"Extract":I.doc,"Convert to PDF":I.swap,"Convert from PDF":I.swap};
const GROUPS = [
  {cat:"Assemble", tools:[
    ["Merge PDFs","Combine several PDFs into one."],
    ["Split PDF","Keep a single range of pages."],
    ["Delete pages","Remove pages by number or range."],
    ["Organize & rotate","Reorder, rotate, or drop pages."]]},
  {cat:"Optimize", tools:[
    ["Compress PDF","Shrink file size losslessly."]]},
  {cat:"Extract", tools:[
    ["PDF → Text","Pull out the selectable text layer."],
    ["OCR scanned PDF","Read text from scans, on-device."],
    ["PDF → Images","Render each page to a JPG."]]},
  {cat:"Convert to PDF", tools:[
    ["Images → PDF","One image per page."],
    ["Text → PDF","Type or paste, then export."],
    ["Word → PDF","Convert a .docx document."],
    ["Excel / CSV → PDF","Render a spreadsheet as a table."],
    ["PowerPoint → PDF","Lay out each slide's text."]]},
  {cat:"Convert from PDF", tools:[
    ["PDF → Word","Extract text into an editable .docx."],
    ["PDF → Excel","Detect rows and columns."],
    ["PDF → PowerPoint","Turn each page into a slide."]]},
];
const FLAT = GROUPS.flatMap(g=>g.tools.map(t=>({name:t[0],desc:t[1],cat:g.cat})));

function seal(){
  const p=[],inr=[],d=[];
  for(let i=0;i<8;i++)p.push(`<path d="M100 100 C116 60 116 38 100 20 C84 38 84 60 100 100 Z" transform="rotate(${i*45} 100 100)"/>`);
  for(let i=0;i<8;i++)inr.push(`<path d="M100 100 C110 74 110 58 100 46 C90 58 90 74 100 100 Z" transform="rotate(${i*45+22.5} 100 100)"/>`);
  for(let i=0;i<16;i++){const a=i*22.5*Math.PI/180;d.push(`<circle cx="${(100+92*Math.cos(a)).toFixed(1)}" cy="${(100+92*Math.sin(a)).toFixed(1)}" r="2.4"/>`);}
  return `<svg viewBox="0 0 200 200" role="img" aria-label="Patram seal">
    <circle cx="100" cy="100" r="97" fill="none" stroke="#b6862c" stroke-width="1.5"/>
    <g class="rot"><g fill="#e79310" opacity=".92">${p.join("")}</g><g fill="#c0261d" opacity=".9">${inr.join("")}</g><g fill="#b6862c">${d.join("")}</g></g>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#1d3a63" stroke-width="1.2" opacity=".55"/>
    <circle cx="100" cy="100" r="17" fill="#c0261d" stroke="#b6862c" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="6" fill="#e79310"/></svg>`;
}
const header = `
  <div class="topbar">
    <div class="wordmark"><span class="glyph">प</span>
      <span><b>Patram<span class="tld"> पत्रम्</span></b><small>on-device document studio</small></span></div>
    <div class="runtime"><span class="led"></span><span class="rt-label">runtime</span><span class="rt-msg">ready · on-device</span></div>
  </div>`;
const foot = `<div class="foot"><span>NO UPLOAD · PYODIDE (PYTHON/WASM)</span><span>पत्रम् · WORKS OFFLINE ONCE LOADED</span></div>`;

// reusable sample input + output for a "Merge" tool
const sampleInput = `
  <div class="drop"><span class="di">${I.up}</span><strong>Drop PDFs or click to browse</strong><span class="hint">PDF · STAYS ON YOUR DEVICE</span></div>
  <div class="files">
    <div class="file"><span class="fi">${I.file}</span><span><span class="name">contract-v2.pdf</span><br><span class="sub">248 KB</span></span></div>
    <div class="file"><span class="fi">${I.file}</span><span><span class="name">appendix.pdf</span><br><span class="sub">96 KB</span></span></div>
  </div>
  <button class="run">${I.run}<span>Merge PDFs</span></button>`;
const sampleOutput = `
  <div class="result"><div class="ok-ring">${I.check}</div><h4>Done — on your machine</h4>
    <div class="stat-row"><div class="stat"><div class="k">Files</div><div class="v">2</div></div><div class="stat hi"><div class="k">Output</div><div class="v">331 KB</div></div></div>
    <button class="btn-dl">${I.dl}<span>Download merged.pdf</span></button></div>`;

/* ---- LAYOUT 1 : illuminated index -> workbench ------------------------- */
function buildL1(){
  const cards = GROUPS.map(g=>`
    <div class="grouplabel">${g.cat}</div>
    <div class="l1-cards">${g.tools.map((t,i)=>`
      <button class="l1-card" data-name="${t[0]}">
        <span class="fol">${String(FLAT.findIndex(x=>x.name===t[0])+1).padStart(2,"0")}</span>
        <span class="ico">${CATICON[g.cat]}</span>
        <span class="nm">${t[0]}</span><span class="ds">${t[1]}</span></button>`).join("")}</div>`).join("");
  const index = `<div id="l1-index">${cards}</div>`;
  const work = `<div id="l1-work" style="display:none">
    <button class="l1-back" id="l1-back">${I.back} Back to index</button>
    <div class="l1-work">
      <div class="tool-head"><div><h2 id="l1-title">Merge PDFs</h2><p>Combine several PDFs into one. Drag to set the order.</p></div><span class="badge">Python</span></div>
      <div class="grid2"><div>${sampleInput}</div><div><div class="panel-title">Result</div>${sampleOutput}</div></div>
    </div></div>`;
  s1.innerHTML = header + index + work + foot;
  s1.querySelectorAll(".l1-card").forEach(c=>c.onclick=()=>{
    s1.querySelector("#l1-title").textContent=c.dataset.name;
    s1.querySelector("#l1-index").style.display="none";
    s1.querySelector("#l1-work").style.display="";
    window.scrollTo({top:0,behavior:"smooth"});
  });
  s1.querySelector("#l1-back").onclick=()=>{
    s1.querySelector("#l1-work").style.display="none";
    s1.querySelector("#l1-index").style.display="";
  };
}

/* ---- LAYOUT 2 : palm-leaf folio spread -------------------------------- */
function buildL2(){
  const spine = GROUPS.flatMap(g=>g.tools).map((t,i)=>`<button class="sp" title="${t[0]}" ${i===0?'aria-current="true"':''}>${String(i+1).padStart(2,"0")}</button>`).join("");
  s2.innerHTML = header + `
    <div class="l2-wrap">
      <div class="l2-spine">${spine}</div>
      <div class="l2-spread">
        <div class="l2-leaf in"><h3>◂ Input leaf</h3>
          <div class="tool-head" style="border-bottom-width:1px"><div><h2 style="font-size:22px">Merge PDFs</h2></div><span class="badge">Python</span></div>
          ${sampleInput}</div>
        <div class="l2-gutter"><i></i><i></i><i></i><i></i></div>
        <div class="l2-leaf out"><h3>Output leaf ▸</h3>${sampleOutput}</div>
      </div>
    </div>` + foot;
  s2.querySelectorAll(".l2-spine .sp").forEach(b=>b.onclick=()=>{
    s2.querySelectorAll(".l2-spine .sp").forEach(x=>x.removeAttribute("aria-current"));
    b.setAttribute("aria-current","true");
    s2.querySelector(".l2-leaf.in h2").textContent=b.title;
  });
}

/* ---- LAYOUT 3 : top tabs + wide stage --------------------------------- */
function buildL3(){
  const tabs = GROUPS.map((g,i)=>`<button ${i===0?'aria-current="true"':''} data-cat="${g.cat}">${g.cat}</button>`).join("");
  s3.innerHTML = header + `
    <div class="l3-tabs">${tabs}</div>
    <div class="l3-sub" id="l3-sub"></div>
    <div class="l3-stage">
      <div class="tool-head"><div><h2 id="l3-title">Merge PDFs</h2><p>Combine several PDFs into one. Drag to set the order.</p></div><span class="badge">Python</span></div>
      <div class="grid2"><div>${sampleInput}</div><div><div class="panel-title">Result</div>${sampleOutput}</div></div>
    </div>` + foot;
  function fillSub(cat){
    const g=GROUPS.find(x=>x.cat===cat);
    s3.querySelector("#l3-sub").innerHTML=g.tools.map((t,i)=>`<button class="l3-chip" ${i===0?'aria-current="true"':''}>${t[0]}</button>`).join("");
    s3.querySelectorAll(".l3-chip").forEach(c=>c.onclick=()=>{
      s3.querySelectorAll(".l3-chip").forEach(x=>x.removeAttribute("aria-current"));
      c.setAttribute("aria-current","true");s3.querySelector("#l3-title").textContent=c.textContent;});
    s3.querySelector("#l3-title").textContent=g.tools[0][0];
  }
  s3.querySelectorAll(".l3-tabs button").forEach(b=>b.onclick=()=>{
    s3.querySelectorAll(".l3-tabs button").forEach(x=>x.removeAttribute("aria-current"));
    b.setAttribute("aria-current","true");fillSub(b.dataset.cat);});
  fillSub("Assemble");
}

/* ---- LAYOUT 4 : minimal + command palette ----------------------------- */
function buildL4(){
  const rows = FLAT.slice(0,6).map((t,i)=>`
    <div class="l4-row ${i===0?'sel':''}"><span class="ico">${CATICON[t.cat]}</span><span class="nm">${t.name}</span><span class="ct">${t.cat}</span></div>`).join("");
  s4.innerHTML = header + `
    <div class="l4-hero">
      <div class="seal">${seal()}</div>
      <h1>Work your PDFs.<br>Nothing <span class="u">leaves this device</span>.</h1>
      <p>Merge, split, compress, OCR and convert — run by Python in your browser. No upload, no server.</p>
      <div class="l4-search"><span style="color:var(--sindoor)">${I.search}</span><span class="ph">Search a tool…</span><span class="kbd">⌘K</span></div>
      <div class="l4-recent">recent: <b>Merge</b> · <b>OCR</b> · <b>Split</b></div>
      <div class="l4-overlay">
        <div class="bar"><span style="color:var(--sindoor)">${I.search}</span><input placeholder="Type to filter 16 tools…" value=""><span class="kbd">esc</span></div>
        <div class="list">${rows}</div>
      </div>
    </div>` + foot;
}

/* ---- LAYOUT 5 : hero + iLovePDF-style pills + illuminated grid --------- */
function buildL5(){
  const cardsHtml = FLAT.map((t,i)=>`
    <button class="l1-card" data-name="${t.name}" data-cat="${t.cat}">
      <span class="fol">${String(i+1).padStart(2,"0")}</span>
      <span class="ico">${CATICON[t.cat]}</span>
      <span class="nm">${t.name}</span><span class="ds">${t.desc}</span></button>`).join("");
  const pills = ["All",...GROUPS.map(g=>g.cat)].map((c,i)=>
    `<button class="l5-pill" data-cat="${c}" ${i===0?'aria-current="true"':""}>${c}</button>`).join("");
  s5.innerHTML = header + `
    <div class="l5-hero">
      <div class="seal">${seal()}</div>
      <h1>Work your PDFs.<br>Nothing <span class="u">leaves this device</span>.</h1>
      <p>Merge, split, compress, OCR and convert — run by Python in your browser. No upload, no server.</p>
      <div class="l5-search"><span style="color:var(--sindoor)">${I.search}</span>
        <input id="l5-input" placeholder="Search all 16 tools…" autocomplete="off"><span class="kbd">⌘K</span></div>
    </div>
    <div id="l5-index">
      <div class="l5-pills">${pills}</div>
      <div class="l5-grid" id="l5-grid">${cardsHtml}</div>
      <div class="l5-empty" id="l5-empty" style="display:none">No tool matches — try “merge”, “ocr”, or “word”.</div>
    </div>
    <div id="l5-work" style="display:none">
      <button class="l1-back" id="l5-back">${I.back} Back to all tools</button>
      <div class="l1-work">
        <div class="tool-head"><div><h2 id="l5-title">Merge PDFs</h2><p>Combine several PDFs into one. Drag to set the order.</p></div><span class="badge">Python</span></div>
        <div class="grid2"><div>${sampleInput}</div><div><div class="panel-title">Result</div>${sampleOutput}</div></div>
      </div>
    </div>` + foot;

  let activeCat="All";
  const input=s5.querySelector("#l5-input");
  function apply(){
    const q=input.value.trim().toLowerCase();let vis=0;
    s5.querySelectorAll(".l1-card").forEach(c=>{
      const catOk=activeCat==="All"||c.dataset.cat===activeCat;
      const qOk=(c.dataset.name+" "+c.dataset.cat).toLowerCase().includes(q);
      const on=catOk&&qOk;c.style.display=on?"":"none";if(on)vis++;
    });
    s5.querySelector("#l5-empty").style.display=vis?"none":"";
  }
  input.addEventListener("input",apply);
  s5.querySelectorAll(".l5-pill").forEach(p=>p.onclick=()=>{
    s5.querySelectorAll(".l5-pill").forEach(x=>x.removeAttribute("aria-current"));
    p.setAttribute("aria-current","true");activeCat=p.dataset.cat;apply();
  });
  s5.querySelectorAll(".l1-card").forEach(c=>c.onclick=()=>{
    s5.querySelector("#l5-title").textContent=c.dataset.name;
    s5.querySelector(".l5-hero").style.display="none";
    s5.querySelector("#l5-index").style.display="none";
    s5.querySelector("#l5-work").style.display="";
    window.scrollTo({top:0,behavior:"smooth"});
  });
  s5.querySelector("#l5-back").onclick=()=>{
    s5.querySelector("#l5-work").style.display="none";
    s5.querySelector(".l5-hero").style.display="";
    s5.querySelector("#l5-index").style.display="";
  };
}

/* ---- LAYOUT 6 : sidebar nav rail + runtime-loading hero --------------- */
function buildL6(){
  const nav = GROUPS.map(g=>`
    <div class="grouplabel">${g.cat}</div>
    <div class="l6-nav">${g.tools.map(t=>`
      <button class="l6-item" data-name="${t[0]}">
        <span class="no">${String(FLAT.findIndex(x=>x.name===t[0])+1).padStart(2,"0")}</span>
        <span class="nm">${t[0]}</span></button>`).join("")}</div>`).join("");
  const consoleLines = [
    "Fetching Python runtime (WebAssembly)…",
    "Loading Pillow + lxml…",
    "Installing pypdf, openpyxl, fpdf2, python-docx, python-pptx…",
    "Loading engine…",
  ].map(l=>`<div class="ln">${l}</div>`).join("")
    + `<div class="ln ok">engine ready — nothing left this device</div>`;
  s6.innerHTML = header + `
    <div class="l6-wrap">
      <aside class="l6-rail">${nav}</aside>
      <div class="l6-main">
        <div class="seal l6-seal">${seal()}</div>
        <div class="eyebrow">Private document studio</div>
        <h1>Work your PDFs. Nothing ever <span class="u">leaves this device</span>.</h1>
        <p class="l6-lede">Merge, split, compress, OCR and convert — powered by Python compiled to WebAssembly and running right here in your browser. No account, no upload, no server.</p>
        <p class="l6-quote"><b>Patram</b> — पत्रम्, Sanskrit for “leaf, page” — the palm leaf that Indian scribes wrote on for centuries. Yours stay just as private.</p>
        <div class="l6-console">${consoleLines}</div>
        <div class="l6-pills">
          <span class="l6-trust">${I.shield}No file upload</span>
          <span class="l6-trust">${I.shield}Runs offline once loaded</span>
          <span class="l6-trust">${I.shield}Open the network tab — it stays quiet</span>
        </div>
        <p class="l6-cta">Pick a tool to begin.</p>
      </div>
    </div>` + foot;
  s6.querySelectorAll(".l6-item").forEach(b=>b.onclick=()=>{
    s6.querySelectorAll(".l6-item").forEach(x=>x.removeAttribute("aria-current"));
    b.setAttribute("aria-current","true");
  });
}

/* ---- LAYOUT 7 : studio index — hero sidebar + illuminated index ------- */
function buildL7(){
  const cards = FLAT.map((t,i)=>`
    <button class="l1-card" data-name="${t.name}" data-cat="${t.cat}">
      <span class="fol">${String(i+1).padStart(2,"0")}</span>
      <span class="ico">${CATICON[t.cat]}</span>
      <span class="nm">${t.name}</span><span class="ds">${t.desc}</span></button>`).join("");
  const pills = ["All",...GROUPS.map(g=>g.cat)].map((c,i)=>
    `<button class="l5-pill" data-cat="${c}" ${i===0?'aria-current="true"':""}>${c}</button>`).join("");
  s7.innerHTML = header + `
    <div class="l7-wrap">
      <aside class="l7-hero">
        <div class="seal">${seal()}</div>
        <div class="eyebrow">Private document studio</div>
        <h1>Work your PDFs. Nothing ever <span class="u">leaves this device</span>.</h1>
        <p class="l7-lede">Merge, split, compress, OCR and convert — powered by Python compiled to WebAssembly, running right here in your browser. No account, no upload, no server.</p>
        <div class="l7-trust">
          <span class="l6-trust">${I.shield}No file upload</span>
          <span class="l6-trust">${I.shield}Runs offline once loaded</span>
          <span class="l6-trust">${I.shield}Network tab stays quiet</span>
        </div>
      </aside>
      <div>
        <div id="l7-landing">
          <div class="l7-bar">
            <div class="l5-pills">${pills}</div>
            <div class="l5-search"><span style="color:var(--sindoor)">${I.search}</span>
              <input id="l7-input" placeholder="Search all 16 tools…" autocomplete="off"><span class="kbd">⌘K</span></div>
          </div>
          <div class="l5-grid" id="l7-grid">${cards}</div>
          <div class="l5-empty" id="l7-empty" style="display:none">No tool matches — try “merge”, “ocr”, or “word”.</div>
        </div>
        <div id="l7-work" style="display:none">
          <button class="l1-back" id="l7-back">${I.back} Back to all tools</button>
          <div class="l1-work">
            <div class="tool-head"><div><h2 id="l7-title">Merge PDFs</h2><p id="l7-desc">Combine several PDFs into one.</p></div><span class="badge">Python</span></div>
            <div class="grid2"><div>${sampleInput}</div><div><div class="panel-title">Result</div>${sampleOutput}</div></div>
          </div>
        </div>
      </div>
    </div>` + foot;

  let activeCat="All";
  const input=s7.querySelector("#l7-input");
  function apply(){
    const q=input.value.trim().toLowerCase();let vis=0;
    s7.querySelectorAll("#l7-grid .l1-card").forEach(c=>{
      const catOk=activeCat==="All"||c.dataset.cat===activeCat;
      const qOk=(c.dataset.name+" "+c.dataset.cat).toLowerCase().includes(q);
      const on=catOk&&qOk;c.style.display=on?"":"none";if(on)vis++;
    });
    s7.querySelector("#l7-empty").style.display=vis?"none":"";
  }
  input.addEventListener("input",apply);
  s7.querySelectorAll(".l5-pill").forEach(p=>p.onclick=()=>{
    s7.querySelectorAll(".l5-pill").forEach(x=>x.removeAttribute("aria-current"));
    p.setAttribute("aria-current","true");activeCat=p.dataset.cat;apply();
  });
  s7.querySelectorAll("#l7-grid .l1-card").forEach(c=>c.onclick=()=>{
    const meta=FLAT.find(x=>x.name===c.dataset.name);
    s7.querySelector("#l7-title").textContent=c.dataset.name;
    s7.querySelector("#l7-desc").textContent=meta?meta.desc:"";
    s7.querySelector("#l7-landing").style.display="none";
    s7.querySelector("#l7-work").style.display="";
    window.scrollTo({top:0,behavior:"smooth"});
  });
  s7.querySelector("#l7-back").onclick=()=>{
    s7.querySelector("#l7-work").style.display="none";
    s7.querySelector("#l7-landing").style.display="";
  };
}

buildL1();buildL2();buildL3();buildL4();buildL5();buildL6();buildL7();

/* ⌘K / Ctrl-K focuses the hero search on the featured layout */
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){
    const on=document.querySelector(".screen.on");
    const inp=on&&on.querySelector('input[id$="-input"]');
    if(inp){e.preventDefault();inp.focus();}
  }
});

function show(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.getElementById("s"+n).classList.add("on");
  document.querySelectorAll("#seg button").forEach(b=>b.setAttribute("aria-current",b.dataset.l===n?"true":"false"));
  document.getElementById("note").innerHTML=NOTES[n];
  window.scrollTo({top:0});
}
document.getElementById("seg").addEventListener("click",e=>{const b=e.target.closest("button");if(b)show(b.dataset.l);});
show("7");
</script>
